<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Mangómetro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar simple -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <h2>🥭 Mangómetro</h2>
            </a>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h1>🔒 Recuperar Contraseña</h1>
                <p class="auth-subtitle">Ingresa tu email para recibir un código de recuperación</p>

                <form id="recover-form">
                    <div class="form-group">
                        <label for="email">Email registrado</label>
                        <input type="email" id="email" required placeholder="tu@email.com">
                    </div>

                    <button type="submit" class="btn-primary btn-large">Enviar Código</button>
                </form>

                <div id="code-section" style="display: none;">
                    <h3>Código enviado a tu email</h3>
                    <div class="form-group">
                        <label for="code">Código de 6 dígitos</label>
                        <input type="text" id="code" maxlength="6" placeholder="123456">
                    </div>
                    <div class="form-group">
                        <label for="new-password">Nueva Contraseña</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <button class="btn-primary btn-large">Cambiar Contraseña</button>
                </div>

                <p class="auth-footer-small">
                    <a href="login.html">← Volver al Login</a>
                </p>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('recover-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const codeSection = document.getElementById('code-section');
            const codeInput = document.getElementById('code');
            
            // Sim 2 pasos
            const code = Math.floor(100000 + Math.random() * 900000);
            alert(`Código simulado: ${code} (en prod via email)`);
            
            codeSection.style.display = 'block';
            
            codeInput.addEventListener('input', function() {
                if (this.value.length === 6) {
                    document.querySelector('#code-section button').disabled = false;
                }
            });
            
            document.querySelector('#code-section button').addEventListener('click', function() {
                if (codeInput.value == code) {
                    alert('✅ Contraseña cambiada! Ve al login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Código incorrecto');
                }
            });
        });
    </script>
</body>
</html>
