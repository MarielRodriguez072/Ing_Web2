<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Mangómetro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="css/base/variables.css">
    <link rel="stylesheet" href="css/base/components.css">
    <link rel="stylesheet" href="css/base/utilities.css">
    <link rel="stylesheet" href="css/pages/landing.css">
    <link rel="stylesheet" href="css/pages/auth.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🥭</text></svg>">
</head>
<body class="auth-page">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="Mangómetro Home">
                <h2>🥭 Mangómetro</h2>
            </a>
            <div class="nav-buttons">
                <a href="login.html" class="btn-secondary btn-sm">Iniciar Sesión</a>
            </div>
        </div>
    </nav>

    <!-- Alert Container -->
    <div id="alert-container" class="alert-stack"></div>

    <!-- Recover Section -->
    <section class="auth-section" role="main">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">🔒</div>
                    <h1>Recuperar Contraseña</h1>
                    <p class="auth-subtitle">Ingresa tu email para recibir un código de verificación</p>
                </div>

                <!-- Step 1: Email -->
                <form id="recover-email-form" class="auth-form active-step">
                    <div class="form-group">
                        <label for="recover-email">Email registrado</label>
                        <input 
                            type="email" 
                            id="recover-email" 
                            placeholder="tu@ejemplo.com" 
                            required 
                            autocomplete="email"
                        >
                    </div>
                    <button type="submit" class="btn-primary btn-large full-width">Enviar Código</button>
                </form>

                <!-- Step 2: Code + New Password -->
                <form id="recover-code-form" class="auth-form hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recover-code">Código (6 dígitos)</label>
                            <input 
                                type="text" 
                                id="recover-code" 
                                maxlength="6" 
                                placeholder="123456" 
                                inputmode="numeric"
                            >
                        </div>
                        <div class="form-group">
                            <button type="button" id="resend-code" class="btn-secondary btn-sm">Reenviar</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="new-password">Nueva Contraseña</label>
                        <div class="password-container">
                            <input 
                                type="password" 
                                id="new-password" 
                                minlength="6" 
                                placeholder="Nueva contraseña"
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password" aria-label="Mostrar contraseña">👁</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirmar Nueva Contraseña</label>
                        <div class="password-container">
                            <input 
                                type="password" 
                                id="confirm-password" 
                                minlength="6" 
                                placeholder="Confirmar contraseña"
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password" aria-label="Mostrar contraseña">👁</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-large full-width" disabled> Cambiar Contraseña </button>
                </form>

                <div class="auth-links">
                    <a href="login.html" class="auth-link">← Volver al Login</a>
                    <a href="register.html" class="auth-link">Crear Cuenta</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Mangómetro. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Estado
        let expectedCode = null;

        // Elements
        const emailForm = document.getElementById('recover-email-form');
        const codeForm = document.getElementById('recover-code-form');
        const emailInput = document.getElementById('recover-email');
        const codeInput = document.getElementById('recover-code');
        const newPassInput = document.getElementById('new-password');
        const confirmPassInput = document.getElementById('confirm-password');
        const resendBtn = document.getElementById('resend-code');
        const codeSubmitBtn = codeForm.querySelector('button[type="submit"]');
        const toggleBtns = document.querySelectorAll('.toggle-password');
        const alertContainer = document.getElementById('alert-container');

        // Password toggle
        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.parentElement.querySelector('input');
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                btn.textContent = type === 'password' ? '👁' : '👁‍🗨️';
            });
        });

        // Step 1: Send code
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            
            if (!email) {
                showAlert('Ingresa tu email', 'error');
                return;
            }

            // Simular usuarios locales
            const users = JSON.parse(localStorage.getItem('mangometro_users') || '[]');
            const userExists = users.some(u => u.email === email);
            
            if (!userExists) {
                showAlert('Email no registrado', 'error');
                return;
            }

            // Generar código
            expectedCode = String(Math.floor(100000 + Math.random() * 900000)).padStart(6, '0');
            showAlert(`✅ Código ${expectedCode} enviado a ${email} (demo)`, 'success');

            // Mostrar paso 2
            emailForm.style.display = 'none';
            codeForm.style.display = 'block';
            codeForm.scrollIntoView({ behavior: 'smooth' });
            
            // Habilitar submit cuando 6 dígitos
            codeInput.addEventListener('input', () => {
                codeSubmitBtn.disabled = codeInput.value.length !== 6;
            });
        });

        // Step 2: Verify + Change password
        codeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (codeInput.value !== expectedCode) {
                showAlert('Código incorrecto', 'error');
                return;
            }

            if (newPassInput.value !== confirmPassInput.value) {
                showAlert('Contraseñas no coinciden', 'error');
                return;
            }

            if (newPassInput.value.length < 6) {
                showAlert('Mínimo 6 caracteres', 'error');
                return;
            }

            // Actualizar localStorage
            const users = JSON.parse(localStorage.getItem('mangometro_users') || '[]');
            const userIndex = users.findIndex(u => u.email === emailInput.value);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPassInput.value; // Plain text (demo)
                localStorage.setItem('mangometro_users', JSON.stringify(users));
                
                showAlert('✅ Contraseña actualizada!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }
        });

        // Resend code
        resendBtn.addEventListener('click', () => {
            expectedCode = String(Math.floor(100000 + Math.random() * 900000)).padStart(6, '0');
            showAlert(`Nuevo código: ${expectedCode}`, 'info');
            codeInput.value = '';
            codeInput.focus();
        });

        // Alert system
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span class="alert-icon">${getAlertIcon(type)}</span>
                <span>${message}</span>
            `;
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        }

        function getAlertIcon(type) {
            const icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️'
            };
            return icons[type] || 'ℹ️';
        }

        // Enter en code input → submit
        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && codeInput.value.length === 6) {
                codeForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
