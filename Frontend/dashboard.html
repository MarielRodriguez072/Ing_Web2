<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard de Mangómetro - Ve un resumen de tus finanzas personales en tiempo real.">
    <title>Dashboard - Mangómetro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;display=swap">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard-sidebar.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/analysis.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🥭</text></svg>">
</head>
<body>
    <!-- Alert Container -->
    <div id="alert-container" class="alert-stack"></div>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2 class="sidebar-logo">🥭 Mangómetro</h2>
          </div>
          <nav class="sidebar-nav">
            <ul>
              <li><a href="dashboard.html" class="sidebar-link active" data-page="dashboard">📊 Dashboard</a></li>
              <li><a href="tickets.html" class="sidebar-link" data-page="tickets">📱 Carga de tickets</a></li>
              <li><a href="analysis.html" class="sidebar-link" data-page="analysis">📈 Análisis de gastos</a></li>
              <li><hr class="sidebar-divider"></li>
              <li><a href="#" id="sidebar-logout" class="sidebar-link logout-link">🚪 Cerrar Sesión</a></li>
            </ul>
          </nav>
        </aside>

        <div class="dashboard-main">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <p>Resumen de tus finanzas en tiempo real</p>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary btn-sm user-profile-btn" id="user-profile">
                        👤 <span id="user-name">Usuario</span>
                        <span id="role-indicator" class="role-badge cliente"></span>
                    </button>
                </div>

                </header>

            <!-- Page Content -->
            <main class="dashboard-content">
                <!-- KPI Cards -->
                <div class="fintech-kpis">
                    <div class="kpi-card total">
                        <div class="kpi-icon">💰</div>
                        <div class="kpi-content">
                            <h3>Total Gastado</h3>
                            <div class="kpi-metric" id="total-gastado">$0.00</div>
                            <p class="kpi-label">Este mes</p>
                        </div>
                    </div>
                    <div class="kpi-card average">
                        <div class="kpi-icon">📊</div>
                        <div class="kpi-content">
                            <h3>Promedio Diario</h3>
                            <div class="kpi-metric" id="avg-diario">$0.00</div>
                            <p class="kpi-label">Promedio</p>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="dashboard-actions">
                    <button id="add-expense-btn" class="btn btn-primary btn-full">➕ Agregar Gasto</button>
                </div>

                <!-- Recent Expenses Table -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Descripción</th>
                                <th>Categoría</th>
                                <th>Monto</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" class="centered">
                                    No hay gastos recientes
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

<script src="js/auth.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/auth-events.js"></script>

</body>
</html>
