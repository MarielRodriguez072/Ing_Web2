<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard de Mangómetro - Ve un resumen de tus finanzas personales en tiempo real.">
    <title>Dashboard - Mangómetro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;display=swap">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="components/dashboard-sidebar.css">
    <link rel="stylesheet" href="analysis.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🥭</text></svg>">
</head>
<body>
    <!-- Alert Container -->
    <div id="alert-container" style="position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; max-width: 400px;"></div>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2 class="sidebar-logo">🥭 Mangómetro</h2>
          </div>
          <nav class="sidebar-nav">
            <ul>
              <li><a href="dashboard.html" class="sidebar-link active" data-page="dashboard">📊 Dashboard</a></li>
              <li><a href="tickets.html" class="sidebar-link" data-page="tickets">📱 Carga de tickets</a></li>
              <li><a href="analysis.html" class="sidebar-link" data-page="analysis">📈 Análisis de gastos</a></li>
              <li><hr class="sidebar-divider"></li>
              <li><a href="#" id="sidebar-logout" class="sidebar-link logout-link">🚪 Cerrar Sesión</a></li>
            </ul>
          </nav>
        </aside>

        <div class="dashboard-main">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <p>Resumen de tus finanzas en tiempo real</p>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary btn-sm user-profile-btn" id="user-profile">
                        👤 <span id="user-name">Usuario</span>
                        <span id="role-indicator" class="role-badge cliente" style="margin-left: 0.5rem; font-size: 0.75rem; padding: 0.2rem 0.4rem; border-radius: 10px; background: rgba(46,204,113,0.2); color: #2ECC71;"></span>
                    </button>
                </div>

                <style>
                    .user-profile-btn {
                        display: flex !important;
                        align-items: center !important;
                        gap: 0.5rem !important;
                        padding: 8px 16px !important;
                        border-radius: 20px !important;
                        font-weight: 500 !important;
                        transition: all 0.3s !important;
                        white-space: nowrap !important;
                    }
                    .user-profile-btn:hover {
                        background: rgba(255,199,44,0.2) !important;
                        transform: translateY(-1px) !important;
                        box-shadow: 0 4px 12px rgba(255,199,44,0.3) !important;
                    }
                    .role-badge {
                        font-size: 0.75rem !important;
                        padding: 0.25rem 0.5rem !important;
                        border-radius: 12px !important;
                        font-weight: 600 !important;
                    }
                    .role-badge.cliente { background: rgba(46,204,113,0.2) !important; color: #2ECC71 !important; }
                    .role-badge.asesor { background: rgba(52,152,219,0.2) !important; color: #3498DB !important; }
                </style>



            </header>

            <!-- Page Content -->
            <main class="dashboard-content">
                <!-- KPI Cards -->
                <div class="fintech-kpis">
                    <div class="kpi-card total">
                        <div class="kpi-icon">💰</div>
                        <div class="kpi-content">
                            <h3>Total Gastado</h3>
                            <div class="kpi-metric" id="total-gastado">$0.00</div>
                            <p class="kpi-label">Este mes</p>
                        </div>
                    </div>
                    <div class="kpi-card average">
                        <div class="kpi-icon">📊</div>
                        <div class="kpi-content">
                            <h3>Promedio Diario</h3>
                            <div class="kpi-metric" id="avg-diario">$0.00</div>
                            <p class="kpi-label">Promedio</p>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div style="margin-bottom: 2rem;">
                    <button id="add-expense-btn" class="btn btn-primary" style="width: 100%; padding: 16px;">➕ Agregar Gasto</button>
                </div>

                <!-- Recent Expenses Table -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Descripción</th>
                                <th>Categoría</th>
                                <th>Monto</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-light); padding: 2rem;">
                                    No hay gastos recientes
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

<script src="auth.js"></script>
    <script src="roles.js"></script>
    <script src="expenses.js"></script>
    <script src="dashboard.js"></script>
    <script src="auth-events.js"></script>

</body>
</html>
