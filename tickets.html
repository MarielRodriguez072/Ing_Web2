<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Carga tus tickets y recibos en Mangómetro para registrar tus gastos automáticamente.">
    <title>Carga de Tickets - Mangómetro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🥭</text></svg>">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Navegación principal">
        <div class="nav-container">
            <a href="index.html" class="logo" title="Volver a Mangómetro">
                <h2>🥭 Mangómetro</h2>
            </a>
            <div class="nav-buttons">
                <button class="btn-secondary" id="logout-btn">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- Tickets Content -->
    <section class="tickets-section" role="main">
        <div class="container" style="max-width: 600px;">
            <h1>📱 Carga de Tickets</h1>
            <p class="page-subtitle">Sube una imagen de tu recibo para registrar gastos automáticamente</p>

            <div class="ticket-form-card">
                <!-- File Upload -->
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-content">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📸</div>
                        <h3>Arrastra tu ticket aquí</h3>
                        <p>o haz clic para seleccionar una imagen</p>
                        <input 
                            type="file" 
                            id="fileInput" 
                            accept="image/*" 
                            style="display: none;"
                            aria-label="Seleccionar archivo de imagen"
                        >
                    </div>
                </div>

                <div id="preview" style="display: none; margin: 1.5rem 0;">
                    <img id="previewImg" style="max-width: 100%; border-radius: 12px;">
                </div>

                <!-- Manual Form -->
                <form id="ticket-form" class="ticket-form">
                    <h3 style="margin-top: 2rem; color: var(--text);">O completa manualmente:</h3>

                    <div class="form-group">
                        <label for="commerce">Comercio / Tienda</label>
                        <input 
                            type="text" 
                            id="commerce" 
                            name="commerce" 
                            placeholder="Ej: Supermercado Día" 
                            aria-label="Nombre del comercio"
                        >
                    </div>

                    <div class="form-group">
                        <label for="amount">Monto</label>
                        <input 
                            type="number" 
                            id="amount" 
                            name="amount" 
                            placeholder="0.00" 
                            step="0.01"
                            min="0"
                            aria-label="Monto del gasto"
                        >
                    </div>

                    <div class="form-group">
                        <label for="date">Fecha</label>
                        <input 
                            type="date" 
                            id="date" 
                            name="date"
                            aria-label="Fecha del gasto"
                        >
                    </div>

                    <div class="form-group">
                        <label for="category">Categoría</label>
                        <select id="category" name="category" aria-label="Categoría del gasto">
                            <option value="">Selecciona una categoría</option>
                            <option value="supermercado">Supermercado</option>
                            <option value="transporte">Transporte</option>
                            <option value="entretenimiento">Entretenimiento</option>
                            <option value="comida">Comida y Restaurantes</option>
                            <option value="servicios">Servicios</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Descripción (opcional)</label>
                        <textarea 
                            id="description" 
                            name="description" 
                            placeholder="Añade notas sobre este gasto"
                            rows="3"
                            aria-label="Descripción adicional"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-large" style="width: 100%;">
                        💾 Guardar Gasto
                    </button>
                </form>
            </div>

            <!-- Navigation Links -->
            <div style="margin-top: 2rem; text-align: center;">
                <a href="dashboard.html" class="link">← Volver al Dashboard</a>
                <span style="color: var(--text-light); margin: 0 1rem;">•</span>
                <a href="analysis.html" class="link">Ver Análisis →</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <p>&copy; 2026 Mangómetro. Todos los derechos reservados.</p>
        </div>
    </footer>

    <style>
        .tickets-section {
            min-height: 100vh;
            padding: 100px 20px 40px;
            background: var(--bg);
        }

        .tickets-section h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .ticket-form-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .upload-zone {
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255, 199, 44, 0.05);
        }

        .upload-zone:hover {
            background: rgba(255, 199, 44, 0.1);
            border-color: var(--secondary);
        }

        .upload-zone.active {
            background: rgba(255, 199, 44, 0.15);
            border-color: var(--secondary);
        }

        .upload-content h3 {
            color: var(--text);
            margin: 1rem 0 0.5rem;
        }

        .upload-content p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .ticket-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 199, 44, 0.1);
        }

        .link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .link:hover {
            color: var(--secondary);
        }

        @media (max-width: 768px) {
            .tickets-section {
                padding: 100px 20px 40px;
            }

            .tickets-section h1 {
                font-size: 1.8rem;
            }

            .ticket-form-card {
                padding: 1.5rem;
            }
        }
    </style>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');

        // Click to upload
        uploadZone.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('active');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('active');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('active');
            handleFile(e.dataTransfer.files[0]);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    preview.style.display = 'block';
                    alert('📸 Imagen cargada\n\n⚠️ La extracción con IA está en desarrollo');
                };
                reader.readAsDataURL(file);
            } else {
                alert('Por favor, selecciona una imagen válida');
            }
        }

        document.getElementById('ticket-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // Obtener datos del formulario
            const commerce = document.getElementById('commerce').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value.trim();

            // Validar datos
            if (!commerce || !amount || !date || !category) {
                alert('Por favor, completa todos los campos obligatorios');
                return;
            }

            if (amount <= 0) {
                alert('El monto debe ser mayor a 0');
                return;
            }

            // Obtener usuario actual
            const userStr = localStorage.getItem('mangometro_user');
            if (!userStr) {
                alert('No hay sesión activa. Por favor, inicia sesión.');
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);

            // Crear objeto de gasto
            const expense = {
                id: Date.now().toString(),
                commerce: commerce,
                amount: amount.toFixed(2),
                date: date,
                category: category,
                description: description || '',
                userId: user.id,
                createdAt: new Date().toISOString()
            };

            // Guardar gasto
            saveExpense(expense);

            alert('✅ Gasto guardado correctamente');
            this.reset();
            preview.style.display = 'none';

            // Set today's date as default again
            document.getElementById('date').valueAsDate = new Date();
        });

        function saveExpense(expense) {
            const expensesKey = `mangometro_expenses_${expense.userId}`;
            const existingExpensesStr = localStorage.getItem(expensesKey);
            const existingExpenses = existingExpensesStr ? JSON.parse(existingExpensesStr) : [];

            // Agregar nuevo gasto
            existingExpenses.push(expense);

            // Guardar en localStorage
            localStorage.setItem(expensesKey, JSON.stringify(existingExpenses));
        }

        document.getElementById('logout-btn').addEventListener('click', function() {
            alert('Sesión cerrada correctamente');
            window.location.href = 'index.html';
        });

        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
